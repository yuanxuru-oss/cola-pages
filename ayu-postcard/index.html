<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明信片动画 · 小巧思预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#19C8B9;--yellow:#F7CD67;--orange:#E59266;
  --ink:#725D42;--dark:#794F27;--muted:#9F927D;
  --bg:#F8F8F0;--card-bg:#F7F3DF;--border:#C4B89E;
  --white:#fff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Nunito,'Noto Sans SC',sans-serif;font-size:16px;line-height:1.7;color:var(--ink);background:var(--bg);font-weight:500}
.preview-bar{background:var(--mint);color:#fff;text-align:center;padding:10px;font-size:.72rem;font-weight:700;letter-spacing:1px}
.container{max-width:520px;margin:0 auto;padding:40px 24px}

.hero{text-align:center;margin-bottom:40px}
.hero h1{font-family:'ZCOOL KuaiLe',cursive;font-size:1.8rem;color:var(--dark);margin-bottom:6px}
.hero .sub{font-size:.85rem;color:var(--muted)}

/* 护照留言卡片 */
.passport-wall{display:flex;flex-direction:column;gap:14px;margin-bottom:40px}
.visitor-passport{
  background:var(--card-bg);border-radius:16px;padding:18px 20px;
  position:relative;display:flex;align-items:center;gap:14px;
  animation:postcardIn .6s cubic-bezier(.34,1.56,.64,1) both;
  transform-origin:center center;
}
.visitor-passport::after{content:'✦';position:absolute;top:12px;right:16px;font-size:1rem;color:var(--orange);opacity:.5;transform:rotate(15deg)}
.visitor-passport:nth-child(1){animation-delay:0s}
.visitor-passport:nth-child(2){animation-delay:.15s}
.visitor-passport:nth-child(3){animation-delay:.3s}
@keyframes postcardIn{
  0%{opacity:0;transform:rotateY(90deg) translateY(20px) scale(.85)}
  60%{opacity:1;transform:rotateY(-8deg) translateY(-4px) scale(1.02)}
  100%{opacity:1;transform:rotateY(0deg) translateY(0) scale(1)}
}
.vp-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:rgba(25,200,185,.1);flex-shrink:0}
.vp-content{flex:1}
.vp-name{font-size:.78rem;font-weight:700;color:var(--dark);margin-bottom:2px}
.vp-msg{font-size:.78rem;color:var(--ink);line-height:1.5}
.vp-time{font-size:.65rem;color:var(--muted);margin-top:4px}

/* 表单 */
.form{background:var(--white);border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(61,52,40,.06)}
.form label{font-size:.65rem;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:6px}
.form input,.form textarea{width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);font-family:Nunito,'Noto Sans SC',sans-serif;font-size:.85rem;color:var(--ink);margin-bottom:12px;resize:none;outline:none;transition:border .2s}
.form input:focus,.form textarea:focus{border-color:var(--mint)}
.form textarea{min-height:60px}
.avatar-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.avatar-pick span{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;border:2px solid transparent;transition:all .2s;background:var(--bg)}
.avatar-pick span:hover{border-color:var(--mint);transform:scale(1.15)}
.avatar-pick span.sel{border-color:var(--mint);background:rgba(25,200,185,.1)}
.btn{display:inline-block;padding:10px 28px;border-radius:50px;background:var(--mint);color:#fff;border:none;font-weight:700;font-size:.82rem;cursor:pointer;font-family:Nunito,'Noto Sans SC',sans-serif;transition:transform .2s,.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(25,200,185,.3)}

@keyframes stampPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:1}}
.stamp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;z-index:999;pointer-events:none;animation:stampPop .5s ease-out forwards}

.note{text-align:center;margin-top:32px;font-size:.72rem;color:var(--muted)}
.note .accent{color:var(--mint);font-weight:700}
</style>
</head>
<body>

<div class="preview-bar">📮 留言板明信片翻转动画 · 独立预览</div>

<div class="container">

<div class="hero">
  <h1>📮 投递一张明信片</h1>
  <p class="sub">已有留言带翻转入场 · 新留言翻转飞入 + 印章弹出</p>
</div>

<div class="passport-wall" id="wall">
  <div class="visitor-passport">
    <div class="vp-avatar">🐱</div>
    <div class="vp-content"><div class="vp-name">路过的小猫</div><div class="vp-msg">画风好温暖！月亮修补师太治愈了 🌙</div><div class="vp-time">2 小时前</div></div>
  </div>
  <div class="visitor-passport">
    <div class="vp-avatar">🐻</div>
    <div class="vp-content"><div class="vp-name">泉州小熊</div><div class="vp-msg">刺桐双子星把闽南文化做活了 ✨</div><div class="vp-time">昨天</div></div>
  </div>
  <div class="visitor-passport">
    <div class="vp-avatar">🦊</div>
    <div class="vp-content"><div class="vp-name">设计狐</div><div class="vp-msg">金骐元宝的配色绝了 🐴</div><div class="vp-time">3 天前</div></div>
  </div>
</div>

<div class="form">
  <label>写张明信片投进信箱</label>
  <input type="text" id="name" placeholder="你的名字" maxlength="12">
  <div class="avatar-pick" id="apick">
    <span data-av="🐱" class="sel">🐱</span><span data-av="🐻">🐻</span><span data-av="🦊">🦊</span><span data-av="🐧">🐧</span><span data-av="🐶">🐶</span><span data-av="🐸">🐸</span><span data-av="🐰">🐰</span><span data-av="🦉">🦉</span>
  </div>
  <textarea id="msg" placeholder="写下你想说的话…" maxlength="200"></textarea>
  <button class="btn" id="send">🛫 投递明信片</button>
</div>

<p class="note">CSS <span class="accent">30 行</span> + JS <span class="accent">15 行</span></p>

</div>

<script>
var av='🐱';
document.getElementById('apick').addEventListener('click',function(e){
  if(e.target.dataset.av){
    document.querySelectorAll('#apick span').forEach(function(s){s.classList.remove('sel')});
    e.target.classList.add('sel');av=e.target.dataset.av;
  }
});
document.getElementById('send').addEventListener('click',function(){
  var n=document.getElementById('name').value.trim(),m=document.getElementById('msg').value.trim();
  if(!n||!m)return;
  var c=document.createElement('div');c.className='visitor-passport';
  c.innerHTML='<div class="vp-avatar">'+av+'</div><div class="vp-content"><div class="vp-name">'+n+'</div><div class="vp-msg">'+m+'</div><div class="vp-time">刚刚</div></div>';
  document.getElementById('wall').insertBefore(c,document.getElementById('wall').firstChild);
  var s=document.createElement('div');s.className='stamp';s.textContent='✉️';document.body.appendChild(s);
  setTimeout(function(){s.remove()},500);
  document.getElementById('name').value='';document.getElementById('msg').value='';
});
</script>

</body>
</html>
