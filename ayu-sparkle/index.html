<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鼠标星轨 · 小巧思预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#19C8B9;--yellow:#F7CD67;--orange:#E59266;
  --ink:#725D42;--dark:#794F27;--muted:#9F927D;
  --bg:#F8F8F0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Nunito,'Noto Sans SC',sans-serif;font-size:16px;line-height:1.7;color:var(--ink);background:var(--bg);font-weight:500;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:48px 24px}
.preview-bar{position:fixed;top:0;left:0;right:0;background:var(--mint);color:#fff;text-align:center;padding:10px;font-size:.72rem;font-weight:700;z-index:10}
h1{font-family:'ZCOOL KuaiLe',cursive;font-size:2rem;color:var(--dark);margin-bottom:8px}
.sub{font-size:.9rem;color:var(--muted);margin-bottom:40px}
.hint-card{display:inline-block;background:#fff;border-radius:20px;padding:32px 40px;box-shadow:0 4px 20px rgba(61,52,40,.06)}
.hint-card p{font-size:.85rem;color:var(--ink);line-height:2}
.accent{color:var(--mint);font-weight:700}
.tag{font-size:.68rem;font-weight:700;padding:3px 12px;border-radius:50px;display:inline-block;margin:2px}
.tag-mint{background:rgba(25,200,185,.13);color:var(--mint)}
.tag-yellow{background:rgba(247,205,103,.28);color:#8a6918}
.tag-orange{background:rgba(229,146,102,.18);color:#c46e3d}

.sparkle{position:fixed;pointer-events:none;z-index:9999;animation:sf .8s ease-out forwards}
@keyframes sf{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0) rotate(var(--rot))}}
</style>
</head>
<body>
<div class="preview-bar">✨ 鼠标拖尾小星星 · 独立预览</div>
<div class="container">
  <h1>移动鼠标试试</h1>
  <p class="sub">三色小星星跟着光标飘出来</p>
  <div class="hint-card">
    <p>越快 → 星星越多 ✦✧⋆</p>
    <p>停下来 → 慢慢消失</p>
    <p>
      <span class="tag tag-mint">薄荷绿</span>
      <span class="tag tag-yellow">阳光黄</span>
      <span class="tag tag-orange">蜜柑橙</span>
    </p>
    <p style="font-size:.72rem;color:var(--muted);margin-top:12px;">总共 <span class="accent">18 行 JS</span>，直接加进 main.js</p>
  </div>
</div>
<script>
(function(){
  var lx=0,ly=0,lt=0;
  var C=['#19C8B9','#F7CD67','#E59266','#82D5BB','#F8A6B2'];
  var S=['✦','✧','·','◆','⋆'];
  function s(x,y){
    var e=document.createElement('span');e.className='sparkle';
    e.textContent=S[Math.floor(Math.random()*S.length)];
    e.style.cssText='left:'+x+'px;top:'+y+'px;font-size:'+(8+Math.random()*10)+'px;color:'+C[Math.floor(Math.random()*C.length)]+';--dx:'+(Math.random()*40-20)+'px;--dy:'+(Math.random()*40-20)+'px;--rot:'+(Math.random()*180-90)+'deg';
    document.body.appendChild(e);setTimeout(function(){e.remove()},800);
  }
  document.addEventListener('mousemove',function(e){
    var n=Date.now(),d=Math.sqrt((e.clientX-lx)**2+(e.clientY-ly)**2);
    if(d>30&&n-lt>40){s(e.clientX,e.clientY);lx=e.clientX;ly=e.clientY;lt=n;}
  });
})();
</script>
</body>
</html>
